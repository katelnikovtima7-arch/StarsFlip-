<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StarsFlip — монетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0A0F1A;
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #0A0F1A;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            overflow: hidden;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 8px 20px;
            flex-shrink: 0;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #4A8BDF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .how-btn {
            color: #5A6E8A;
            font-size: 0.75rem;
            background: #1A2438;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
        }
        .balance-top {
            text-align: right;
        }
        .balance-top .amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
        }
        .balance-top .label {
            font-size: 0.6rem;
            color: #5A6E8A;
        }
        .multiplier-strip-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 16px 16px 8px 16px;
            flex-shrink: 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            mask-image: linear-gradient(to right, black 0%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 0%, black 85%, transparent 100%);
        }
        .multiplier-strip-wrapper::-webkit-scrollbar { display: none; }
        .multiplier-strip {
            display: flex;
            gap: 12px;
            min-width: min-content;
        }
        .multiplier-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #1A2438;
            border: 1px solid #2A3A50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #5A6E8A;
            flex-shrink: 0;
        }
        .multiplier-circle.active {
            background: #2F9EFF;
            border-color: #2F9EFF;
            color: white;
            box-shadow: 0 0 8px #2f9eff;
        }
        .center-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 10px 16px;
            flex-shrink: 0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-item .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }
        .stat-item .label {
            font-size: 0.6rem;
            color: #5A6E8A;
        }
        .main-coin { text-align: center; }
        .main-coin img {
            width: 120px;
            height: 120px;
            transition: transform 0.2s ease;
            filter: drop-shadow(0 0 10px #2f9eff60);
        }
        .coin-animation {
            animation: coinFlipAnim 0.3s ease-in-out;
        }
        @keyframes coinFlipAnim {
            0% { transform: scale(0.8) rotateY(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotateY(180deg); }
            100% { transform: scale(1) rotateY(360deg); opacity: 1; }
        }
        .choice-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 16px 20px;
            flex-shrink: 0;
        }
        .coin-choice {
            background: #1A2438;
            border: 1px solid #2A3A50;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #A0B4D0;
            cursor: pointer;
        }
        .coin-choice img { width: 24px; height: 24px; }
        .coin-choice.selected {
            background: #2F9EFF;
            border-color: #2F9EFF;
            color: white;
        }
        .bet-panel {
            background: #0F1626;
            margin: 8px 16px;
            padding: 10px 16px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .bet-label { color: #7F8FA4; font-size: 0.75rem; }
        .bet-controls { display: flex; align-items: center; gap: 10px; }
        .bet-input {
            background: #1A2438;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            width: 80px;
            text-align: center;
            padding: 8px 0;
            border-radius: 40px;
        }
        .bet-input:focus { outline: none; box-shadow: 0 0 0 1px #2F9EFF; }
        .bet-btn {
            background: #2A3A50;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 8px 16px;
            flex-shrink: 0;
        }
        .take-btn, .risk-btn {
            flex: 1;
            border: none;
            border-radius: 60px;
            padding: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .take-btn { background: #2F9EFF; color: white; }
        .risk-btn { background: #2A3A50; color: white; }
        .play-btn {
            background: #2F9EFF;
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 8px 16px;
            flex-shrink: 0;
        }
        /* ИСТОРИЯ — ВЕРТИКАЛЬНО, КРУПНО, КАЖДЫЙ РЕЗУЛЬТАТ НА НОВОЙ СТРОКЕ */
        .history-section {
            background: #0F1626;
            margin: 8px 16px;
            border-radius: 20px;
            padding: 10px 12px;
            flex-shrink: 0;
            max-height: 130px;
            overflow-y: auto;
        }
        .history-title {
            font-size: 0.6rem;
            color: #5A6E8A;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item {
            background: #1A2438;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #A0B4D0;
            text-align: center;
        }
        .history-item.win { background: #1E6B3E; color: #ccffcc; }
        .history-item.loss { background: #8B3A3A; color: #ffcccc; }
        .history-item.take { background: #2F4A6E; color: #ccddff; }
        
        /* ПРОФИЛЬ */
        .profile-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }
        .profile-stats-row {
            display: flex;
            justify-content: space-between;
            background: #1A2438;
            border-radius: 28px;
            padding: 20px 16px;
            margin-bottom: 24px;
        }
        .profile-stat {
            text-align: center;
            flex: 1;
        }
        .profile-stat .num {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }
        .profile-stat .label {
            font-size: 0.55rem;
            color: #5A6E8A;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .referral-block {
            background: #1A2438;
            border-radius: 28px;
            padding: 20px;
        }
        .referral-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .referral-header h4 {
            color: #2F9EFF;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .referral-two-cols {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
        }
        .ref-item {
            text-align: center;
        }
        .ref-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #FFD966;
        }
        .ref-item .label {
            font-size: 0.55rem;
            color: #5A6E8A;
            margin-top: 4px;
        }
        .ref-btn-big {
            background: #2F9EFF;
            border: none;
            border-radius: 60px;
            padding: 14px;
            width: 100%;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .copy-btn-big {
            background: #2A3A50;
            border: none;
            border-radius: 60px;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
        }
        .ref-hint {
            font-size: 0.55rem;
            color: #5A6E8A;
            text-align: center;
            margin-top: 14px;
        }
        .dynamic-content {
            flex: 1;
            display: none;
            overflow-y: auto;
        }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #0A0F1A;
            border-top: 1px solid #1A2438;
            padding: 10px 16px 20px;
            flex-shrink: 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.5;
            cursor: pointer;
        }
        .nav-item.active { opacity: 1; }
        .nav-icon { font-size: 1.2rem; }
        .nav-label { font-size: 0.6rem; color: #A0B4D0; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="logo">StarsFlip</div>
        <div class="how-btn" id="howBtn">Как играть</div>
        <div class="balance-top">
            <div class="amount" id="balanceValue">50000</div>
            <div class="label">⭐ STARS</div>
        </div>
    </div>

    <div class="multiplier-strip-wrapper">
        <div class="multiplier-strip" id="multiplierStrip"></div>
    </div>

    <div class="center-stats">
        <div class="stat-item">
            <div class="value" id="roundNum">1</div>
            <div class="label">РАУНД</div>
        </div>
        <div class="main-coin">
            <img src="IMG_0944-photos.png" alt="монета" id="mainCoinImg">
        </div>
        <div class="stat-item">
            <div class="value">x1.95</div>
            <div class="label">КЭФ</div>
        </div>
    </div>

    <div class="choice-area">
        <div class="coin-choice" data-side="ОРЕЛ">
            <img src="IMG_0944-photos.png" alt="орёл"> ОРЁЛ
        </div>
        <div class="coin-choice" data-side="РЕШКА">
            <img src="IMG_0945-photos.png" alt="решка"> РЕШКА
        </div>
    </div>

    <div class="bet-panel">
        <span class="bet-label">СТАВКА</span>
        <div class="bet-controls">
            <button class="bet-btn" id="decBet">−</button>
            <input type="number" id="betAmount" class="bet-input" value="100">
            <button class="bet-btn" id="incBet">+</button>
        </div>
    </div>

    <div class="action-buttons" id="actionButtons" style="display: none;">
        <button class="take-btn" id="takeBtn">ЗАБРАТЬ</button>
        <button class="risk-btn" id="riskBtn">КРУТИТЬ</button>
    </div>

    <button class="play-btn" id="playBtn">СДЕЛАТЬ СТАВКУ</button>

    <div class="history-section" id="historySection">
        <div class="history-title">📜 ИСТОРИЯ</div>
        <div class="history-list" id="historyList">
            <div class="history-item">⭐ Добро пожаловать</div>
        </div>
    </div>

    <div class="dynamic-content" id="dynamicContent"></div>

    <div class="bottom-nav">
        <div class="nav-item active" data-tab="coin">
            <div class="nav-icon">🪙</div>
            <div class="nav-label">COINFLIP</div>
        </div>
        <div class="nav-item" data-tab="leaders">
            <div class="nav-icon">🏆</div>
            <div class="nav-label">Лидеры</div>
        </div>
        <div class="nav-item" data-tab="my">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Мой</div>
        </div>
    </div>
</div>
<script>
    // ------------------- TELEGRAM WEBAPP -------------------
    let tg = null;
    let telegramUser = null;
    let userAvatar = null;
    let userName = "Игрок";
    
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            telegramUser = tg.initDataUnsafe?.user;
            if (telegramUser) {
                userName = telegramUser.first_name || telegramUser.username || "Игрок";
                if (telegramUser.photo_url) userAvatar = telegramUser.photo_url;
            }
        }
    } catch(e) { console.log("браузер"); }
    
    // ------------------- ОСНОВНЫЕ ПАРАМЕТРЫ -------------------
    let balance = 50000;
    let currentRound = 1;
    let winStreak = 0;
    let bet = 100;
    let userChoice = "ОРЕЛ";
    const MAX_BET = 100000;
    const BASE_MULTIPLIER = 1.95;
    
    let referralCount = 0;
    let referralEarnings = 0;
    let myReferralCode = "";
    
    function generateReferralCode() {
        if (telegramUser && telegramUser.id) return "ref_" + telegramUser.id;
        let saved = localStorage.getItem('starsflip_ref_code');
        if (saved) return saved;
        let newCode = "ref_" + Math.random().toString(36).substring(2, 10);
        localStorage.setItem('starsflip_ref_code', newCode);
        return newCode;
    }
    
    function createReferralLink() {
        let code = myReferralCode;
        let botUsername = "StarsFlipBot";
        return `https://t.me/${botUsername}?start=${code}`;
    }
    
    function copyReferralLink() {
        let link = createReferralLink();
        if (navigator.clipboard) {
            navigator.clipboard.writeText(link);
            showFloatingMessage("✅ Ссылка скопирована!", "#88FF88");
        } else {
            prompt("Скопируйте ссылку:", link);
        }
    }
    
    myReferralCode = generateReferralCode();
    
    let riskActive = false;
    let currentRiskStep = 1;
    let currentRiskMultiplier = 1.95;
    let currentRiskStake = 0;
    
    let multipliersList = [];
    let mult = 1.95;
    for (let i = 0; i < 12; i++) {
        multipliersList.push(parseFloat(mult.toFixed(2)));
        mult = mult * 1.95;
    }
    
    // DOM элементы
    const balanceEl = document.getElementById('balanceValue');
    const roundEl = document.getElementById('roundNum');
    const betInput = document.getElementById('betAmount');
    const historyList = document.getElementById('historyList');
    const playBtn = document.getElementById('playBtn');
    const actionButtons = document.getElementById('actionButtons');
    const takeBtn = document.getElementById('takeBtn');
    const riskBtn = document.getElementById('riskBtn');
    const mainCoinImg = document.getElementById('mainCoinImg');
    const dynamicContent = document.getElementById('dynamicContent');
    const historySection = document.getElementById('historySection');
    const centerStats = document.querySelector('.center-stats');
    const mainCoinDiv = document.querySelector('.main-coin');
    const choiceArea = document.querySelector('.choice-area');
    const betPanel = document.querySelector('.bet-panel');
    const multiplierStrip = document.getElementById('multiplierStrip');
    
    let isMessageShowing = false;
    function showFloatingMessage(text, color) {
        if (isMessageShowing) return;
        isMessageShowing = true;
        const msg = document.createElement('div');
        msg.style.position = 'fixed';
        msg.style.top = '100px';
        msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)';
        msg.style.backgroundColor = 'rgba(0,0,0,0.9)';
        msg.style.color = color || '#FFD966';
        msg.style.padding = '10px 20px';
        msg.style.borderRadius = '30px';
        msg.style.fontSize = '0.9rem';
        msg.style.zIndex = '10000';
        msg.style.fontWeight = 'bold';
        msg.innerText = text;
        document.body.appendChild(msg);
        setTimeout(() => { msg.remove(); isMessageShowing = false; }, 1500);
    }
    
    function createMultiplierCircles() {
        multiplierStrip.innerHTML = '';
        for (let i = 0; i < 12; i++) {
            const circle = document.createElement('div');
            circle.className = 'multiplier-circle';
            if (i === 0) {
                circle.innerText = `x${multipliersList[0]}`;
                circle.classList.add('active');
            } else if (i === 1) {
                circle.innerText = `x${multipliersList[1]}`;
            } else {
                circle.innerText = `?`;
            }
            multiplierStrip.appendChild(circle);
        }
    }
    createMultiplierCircles();
    const multiplierCircles = document.querySelectorAll('.multiplier-circle');
    
    function updateMultiplierCircles() {
        for (let i = 0; i < multiplierCircles.length; i++) {
            if (i === currentRiskStep - 1) {
                multiplierCircles[i].classList.add('active');
                multiplierCircles[i].innerText = `x${multipliersList[i]}`;
            } else if (i === currentRiskStep) {
                multiplierCircles[i].innerText = `x${multipliersList[i]}`;
            } else if (i < currentRiskStep) {
                multiplierCircles[i].classList.add('active');
                multiplierCircles[i].innerText = `x${multipliersList[i]}`;
            } else {
                multiplierCircles[i].classList.remove('active');
                multiplierCircles[i].innerText = `?`;
            }
        }
        const wrapper = document.querySelector('.multiplier-strip-wrapper');
        const targetCircle = multiplierCircles[currentRiskStep - 1];
        if (targetCircle && wrapper) {
            const scrollLeft = targetCircle.offsetLeft - wrapper.offsetWidth / 2 + targetCircle.offsetWidth / 2;
            wrapper.scrollTo({ left: Math.max(0, scrollLeft), behavior: 'smooth' });
        }
    }
    
    function resetMultiplierCircles() {
        currentRiskStep = 1;
        for (let i = 0; i < multiplierCircles.length; i++) {
            if (i === 0) {
                multiplierCircles[i].classList.add('active');
                multiplierCircles[i].innerText = `x${multipliersList[0]}`;
            } else if (i === 1) {
                multiplierCircles[i].classList.remove('active');
                multiplierCircles[i].innerText = `x${multipliersList[1]}`;
            } else {
                multiplierCircles[i].classList.remove('active');
                multiplierCircles[i].innerText = `?`;
            }
        }
    }
    
    function updateBalanceUI() {
        balanceEl.innerText = Math.floor(balance);
        saveGame();
    }
    
    function addHistory(text, type) {
        const item = document.createElement('div');
        item.className = 'history-item';
        if (type === 'win') {
            item.classList.add('win');
            item.innerText = '🏆 ПОБЕДИЛ(А)';
        } else if (type === 'loss') {
            item.classList.add('loss');
            item.innerText = '💔 ПРОИГРАЛ(А)';
        } else if (type === 'take') {
            item.classList.add('take');
            item.innerText = '💰 ЗАБРАЛ(А)';
        }
        historyList.prepend(item);
        while (historyList.children.length > 12) historyList.removeChild(historyList.lastChild);
        saveGame();
    }
    
    function updateBetUI() {
        if (bet < 1) bet = 1;
        if (bet > MAX_BET) bet = MAX_BET;
        if (bet > balance) bet = balance;
        betInput.value = bet;
        saveGame();
    }
    
    function setChoice(choice) {
        userChoice = choice;
        document.querySelectorAll('.coin-choice').forEach(el => {
            if (el.dataset.side === choice) el.classList.add('selected');
            else el.classList.remove('selected');
        });
        saveGame();
    }
    
    function animateCoin(result) {
        mainCoinImg.classList.remove('coin-animation');
        void mainCoinImg.offsetHeight;
        mainCoinImg.classList.add('coin-animation');
        mainCoinImg.src = result === 'ОРЕЛ' ? 'IMG_0944-photos.png' : 'IMG_0945-photos.png';
        setTimeout(() => mainCoinImg.classList.remove('coin-animation'), 300);
    }
    
    function resetRiskMode() {
        riskActive = false;
        actionButtons.style.display = 'none';
        playBtn.style.display = 'block';
        currentRiskMultiplier = 1.95;
        currentRiskStake = 0;
        currentRiskStep = 1;
        resetMultiplierCircles();
        saveGame();
    }
    
    function takeProfit() {
        if (!riskActive) return;
        balance += currentRiskStake;
        winStreak = 0;
        updateBalanceUI();
        addHistory(`✅ ЗАБРАЛ(А) ${currentRiskStake} ⭐`, 'take');
        resetRiskMode();
        currentRound++;
        roundEl.innerText = currentRound;
        saveGame();
    }
    
    function riskFlip() {
        if (!riskActive) return;
        const result = Math.random() < 0.5 ? "ОРЕЛ" : "РЕШКА";
        const isWin = result === userChoice;
        animateCoin(result);
        if (isWin) {
            currentRiskStep++;
            if (currentRiskStep <= 12) {
                currentRiskMultiplier = multipliersList[currentRiskStep - 1];
                currentRiskStake = Math.floor(bet * currentRiskMultiplier);
                updateMultiplierCircles();
                addHistory(`🪙 РИСК: ${result} ✅`, 'win');
                winStreak++;
                if (currentRiskStep >= 12) addHistory(`🏆 МАКСИМАЛЬНЫЙ МНОЖИТЕЛЬ!`, 'win');
            }
        } else {
            addHistory(`🪙 РИСК: ${result} ❌`, 'loss');
            winStreak = 0;
            resetRiskMode();
            currentRound++;
            roundEl.innerText = currentRound;
        }
        saveGame();
    }
    
    function firstFlip() {
        if (bet > balance) {
            addHistory(`❌ Не хватает Stars`, 'loss');
            return;
        }
        const result = Math.random() < 0.5 ? "ОРЕЛ" : "РЕШКА";
        const isWin = result === userChoice;
        animateCoin(result);
        if (isWin) {
            currentRiskStep = 2;
            currentRiskMultiplier = multipliersList[1];
            currentRiskStake = Math.floor(bet * currentRiskMultiplier);
            riskActive = true;
            actionButtons.style.display = 'flex';
            playBtn.style.display = 'none';
            updateMultiplierCircles();
            addHistory(`🪙 ${result} ✅`, 'win');
            winStreak++;
        } else {
            balance -= bet;
            updateBalanceUI();
            addHistory(`🪙 ${result} ❌`, 'loss');
            winStreak = 0;
            currentRound++;
            roundEl.innerText = currentRound;
            if (balance <= 0) addHistory(`💔 Банкротство`, 'loss');
        }
        updateBetUI();
        saveGame();
    }
    
    function makeBet() {
        if (riskActive) return;
        if (bet < 1 || bet > balance) {
            addHistory(`⚠️ Некорректная ставка`, 'loss');
            return;
        }
        firstFlip();
    }
    
    // ========== ПРОФИЛЬ ==========
    function renderProfileTab() {
        centerStats.style.display = 'none';
        mainCoinDiv.style.display = 'none';
        choiceArea.style.display = 'none';
        betPanel.style.display = 'none';
        playBtn.style.display = 'none';
        actionButtons.style.display = 'none';
        historySection.style.display = 'none';
        document.querySelector('.multiplier-strip-wrapper').style.display = 'none';
        
        dynamicContent.style.display = 'flex';
        dynamicContent.style.flexDirection = 'column';
        dynamicContent.style.padding = '16px';
        
        let level = Math.floor(winStreak / 10) + 1;
        
        dynamicContent.innerHTML = `
            <div class="profile-stats-row">
                <div class="profile-stat">
                    <div class="num">${Math.floor(balance)}</div>
                    <div class="label">БАЛАНС</div>
                </div>
                <div class="profile-stat">
                    <div class="num">${winStreak}</div>
                    <div class="label">ВИНСТРИК</div>
                </div>
                <div class="profile-stat">
                    <div class="num">${currentRound}</div>
                    <div class="label">РАУНДОВ</div>
                </div>
            </div>
            <div class="referral-block">
                <div class="referral-header">
                    <h4>🤝 РЕФЕРАЛЫ</h4>
                </div>
                <div class="referral-two-cols">
                    <div class="ref-item">
                        <div class="value">${referralCount}</div>
                        <div class="label">ПРИГЛАШЕНО</div>
                    </div>
                    <div class="ref-item">
                        <div class="value">${referralEarnings}</div>
                        <div class="label">ЗАРАБОТАНО ⭐</div>
                    </div>
                </div>
                <button class="ref-btn-big" id="inviteBtn">🏆 ПРИГЛАСИТЬ ДРУЗЕЙ</button>
                <button class="copy-btn-big" id="copyLinkBtn">📋 КОПИРОВАТЬ ССЫЛКУ</button>
                <div class="ref-hint">Приглашай друзей и получай 10% от их выигрышей!</div>
            </div>
        `;
        
        document.getElementById('inviteBtn')?.addEventListener('click', () => copyReferralLink());
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => copyReferralLink());
    }
    
    function renderLeadersTab() {
        centerStats.style.display = 'none';
        mainCoinDiv.style.display = 'none';
        choiceArea.style.display = 'none';
        betPanel.style.display = 'none';
        playBtn.style.display = 'none';
        actionButtons.style.display = 'none';
        historySection.style.display = 'none';
        document.querySelector('.multiplier-strip-wrapper').style.display = 'none';
        dynamicContent.style.display = 'flex';
        
        dynamicContent.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px;">
                <div style="font-size:3rem;">🏆</div>
                <div style="font-size:1.2rem; color:white;">Таблица лидеров</div>
                <div style="background:#1A2438; padding:20px; border-radius:30px; width:100%;">
                    <div>1. Игрок_01 — 25000 ⭐</div>
                    <div>2. Игрок_02 — 18000 ⭐</div>
                    <div>3. Игрок_03 — 12000 ⭐</div>
                    <div>4. Игрок_04 — 8900 ⭐</div>
                    <div>5. Игрок_05 — 5400 ⭐</div>
                </div>
            </div>
        `;
    }
    
    function renderCoinTab() {
        dynamicContent.style.display = 'none';
        centerStats.style.display = 'flex';
        mainCoinDiv.style.display = 'block';
        choiceArea.style.display = 'flex';
        betPanel.style.display = 'flex';
        historySection.style.display = 'block';
        document.querySelector('.multiplier-strip-wrapper').style.display = 'block';
        if (riskActive) {
            actionButtons.style.display = 'flex';
            playBtn.style.display = 'none';
        } else {
            actionButtons.style.display = 'none';
            playBtn.style.display = 'block';
        }
    }
    
    // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
    const navItems = document.querySelectorAll('.nav-item');
    let currentTab = 'coin';
    
    function switchTab(tab) {
        if (riskActive && tab !== 'coin') {
            addHistory(`⚠️ Сначала закончи игру`, 'loss');
            return;
        }
        currentTab = tab;
        navItems.forEach(item => {
            item.classList.toggle('active', item.dataset.tab === tab);
        });
        if (tab === 'coin') renderCoinTab();
        else if (tab === 'leaders') renderLeadersTab();
        else if (tab === 'my') renderProfileTab();
    }
    
    navItems.forEach(item => {
        item.addEventListener('click', () => switchTab(item.dataset.tab));
    });
    
    function saveGame() {
        localStorage.setItem('StarsFlipSave', JSON.stringify({
            balance, currentRound, winStreak, bet, userChoice,
            riskActive, currentRiskStep, currentRiskMultiplier, currentRiskStake,
            referralCount, referralEarnings
        }));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('StarsFlipSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                balance = data.balance ?? 50000;
                currentRound = data.currentRound ?? 1;
                winStreak = data.winStreak ?? 0;
                bet = data.bet ?? 100;
                userChoice = data.userChoice ?? "ОРЕЛ";
                riskActive = data.riskActive ?? false;
                currentRiskStep = data.currentRiskStep ?? 1;
                currentRiskMultiplier = data.currentRiskMultiplier ?? 1.95;
                currentRiskStake = data.currentRiskStake ?? 0;
                referralCount = data.referralCount ?? 0;
                referralEarnings = data.referralEarnings ?? 0;
                updateBalanceUI();
                updateBetUI();
                roundEl.innerText = currentRound;
                setChoice(userChoice);
                if (riskActive && currentRiskStep > 1) {
                    actionButtons.style.display = 'flex';
                    playBtn.style.display = 'none';
                    updateMultiplierCircles();
                } else {
                    actionButtons.style.display = 'none';
                    playBtn.style.display = 'block';
                    resetMultiplierCircles();
                }
            } catch(e) {}
        }
        setChoice(userChoice);
        mainCoinImg.src = 'IMG_0944-photos.png';
        renderCoinTab();
    }
    
    // СОБЫТИЯ
    document.getElementById('decBet').addEventListener('click', () => {
        bet = Math.max(1, bet - 10);
        updateBetUI();
    });
    document.getElementById('incBet').addEventListener('click', () => {
        bet = Math.min(MAX_BET, bet + 10);
        if (bet > balance) bet = balance;
        updateBetUI();
    });
    betInput.addEventListener('change', (e) => {
        let v = parseInt(e.target.value);
        if (isNaN(v)) v = 10;
        bet = Math.min(MAX_BET, Math.max(1, v));
        if (bet > balance) bet = balance;
        updateBetUI();
    });
    
    document.querySelectorAll('.coin-choice').forEach(btn => {
        btn.addEventListener('click', () => setChoice(btn.dataset.side));
    });
    
    playBtn.addEventListener('click', makeBet);
    takeBtn.addEventListener('click', takeProfit);
    riskBtn.addEventListener('click', riskFlip);
    
    document.getElementById('howBtn').addEventListener('click', () => {
        alert(`⭐ STARSFLIP\n\n1. Сделай ставку и выбери ОРЁЛ или РЕШКА\n2. Если угадал → ЗАБРАТЬ или КРУТИТЬ ДАЛЬШЕ\n3. 12 шагов, максимальный множитель x${multipliersList[11]}\n4. При проигрыше теряешь всё\n\nУдачи!`);
    });
    
    loadGame();
    if (tg) tg.ready();
</script>
</body>
</html>
