<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StarsFlip — монетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0A0F1A;
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #0A0F1A;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #4A8BDF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .how-btn {
            color: #5A6E8A;
            font-size: 0.75rem;
            background: #1A2438;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
        }
        .balance-top {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1A2438;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .balance-top img { width: 24px; height: 24px; }
        .balance-top .amount { font-size: 1.2rem; font-weight: 700; color: #FFD966; }
        
        .multiplier-strip-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 16px;
            scrollbar-width: none;
        }
        .multiplier-strip-wrapper::-webkit-scrollbar { display: none; }
        .multiplier-strip {
            display: flex;
            gap: 12px;
            min-width: min-content;
        }
        .multiplier-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #1A2438;
            border: 1px solid #2A3A50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #5A6E8A;
            flex-shrink: 0;
        }
        .multiplier-circle.active {
            background: #2F9EFF;
            color: white;
        }
        
        .center-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 10px;
        }
        .stat-item { text-align: center; }
        .stat-item .value { font-size: 1.5rem; font-weight: 700; color: white; }
        .stat-item .label { font-size: 0.6rem; color: #5A6E8A; }
        
        .main-coin { text-align: center; padding: 10px; }
        .main-coin img { width: 120px; height: 120px; transition: transform 0.2s; }
        .coin-animation {
            animation: flip 0.3s ease-in-out;
        }
        @keyframes flip {
            0% { transform: scale(0.8) rotateY(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotateY(180deg); }
            100% { transform: scale(1) rotateY(360deg); opacity: 1; }
        }
        
        .choice-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 16px;
        }
        .coin-choice {
            background: #1A2438;
            border: 1px solid #2A3A50;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #A0B4D0;
            cursor: pointer;
        }
        .coin-choice img { width: 24px; height: 24px; pointer-events: none; }
        .coin-choice.selected {
            background: #2F9EFF;
            color: white;
        }
        
        .bet-panel {
            background: #0F1626;
            margin: 8px 16px;
            padding: 10px 16px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .bet-label { color: #7F8FA4; font-size: 0.75rem; }
        .bet-controls { display: flex; align-items: center; gap: 10px; }
        .bet-input {
            background: #1A2438;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            width: 80px;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
        }
        .bet-btn {
            background: #2A3A50;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 8px 16px;
        }
        .take-btn, .risk-btn {
            flex: 1;
            border: none;
            border-radius: 60px;
            padding: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .take-btn { background: #2F9EFF; color: white; }
        .risk-btn { background: #2A3A50; color: white; }
        
        .play-btn {
            background: #2F9EFF;
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 8px 16px;
        }
        
        .history-section {
            background: #0F1626;
            margin: 8px 16px;
            border-radius: 20px;
            padding: 8px 12px;
            height: 100px;
            overflow-y: auto;
        }
        .history-title { font-size: 0.6rem; color: #5A6E8A; margin-bottom: 6px; }
        .history-list { display: flex; flex-direction: column; gap: 4px; }
        .history-item {
            background: #1A2438;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            text-align: center;
        }
        .history-item.win { background: #1E6B3E; color: #ccffcc; }
        .history-item.loss { background: #8B3A3A; color: #ffcccc; }
        .history-item.take { background: #CC8800; color: white; }
        
        .dynamic-content {
            flex: 1;
            display: none;
            overflow-y: auto;
        }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #0A0F1A;
            border-top: 1px solid #1A2438;
            padding: 10px 16px 20px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.5;
            cursor: pointer;
        }
        .nav-item.active { opacity: 1; }
        .nav-icon { font-size: 1.2rem; }
        .nav-label { font-size: 0.6rem; color: #A0B4D0; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="logo">StarsFlip</div>
        <div class="how-btn" id="howBtn">Как играть</div>
        <div class="balance-top">
            <img src="IMG_0958-photos.png" alt="⭐">
            <span class="amount" id="balanceValue">90000</span>
        </div>
    </div>

    <div class="multiplier-strip-wrapper">
        <div class="multiplier-strip" id="multiplierStrip"></div>
    </div>

    <div class="center-stats">
        <div class="stat-item">
            <div class="value" id="roundNum">1</div>
            <div class="label">РАУНД</div>
        </div>
        <div class="main-coin">
            <img src="IMG_0944-photos.png" alt="монета" id="mainCoinImg">
        </div>
        <div class="stat-item">
            <div class="value" id="kefValue">x1.95</div>
            <div class="label">КЭФ</div>
        </div>
    </div>

    <div class="choice-area">
        <div class="coin-choice" data-side="ОРЕЛ">
            <img src="IMG_0944-photos.png" alt="орёл"> ОРЁЛ
        </div>
        <div class="coin-choice" data-side="РЕШКА">
            <img src="IMG_0945-photos.png" alt="решка"> РЕШКА
        </div>
    </div>

    <div class="bet-panel">
        <span class="bet-label">СТАВКА</span>
        <div class="bet-controls">
            <button class="bet-btn" id="decBet">−</button>
            <input type="number" id="betAmount" class="bet-input" value="100">
            <button class="bet-btn" id="incBet">+</button>
        </div>
    </div>

    <div class="action-buttons" id="actionButtons" style="display: none;">
        <button class="take-btn" id="takeBtn">ЗАБРАТЬ</button>
        <button class="risk-btn" id="riskBtn">КРУТИТЬ</button>
    </div>

    <button class="play-btn" id="playBtn">СДЕЛАТЬ СТАВКУ</button>

    <div class="history-section" id="historySection">
        <div class="history-title">ИСТОРИЯ</div>
        <div class="history-list" id="historyList">
            <div class="history-item">ДОБРО ПОЖАЛОВАТЬ</div>
        </div>
    </div>

    <div class="dynamic-content" id="dynamicContent"></div>

    <div class="bottom-nav">
        <div class="nav-item active" data-tab="coin">
            <div class="nav-icon">🪙</div>
            <div class="nav-label">StarsFlip</div>
        </div>
        <div class="nav-item" data-tab="bonus">
            <div class="nav-icon">🎁</div>
            <div class="nav-label">Бонусы</div>
        </div>
        <div class="nav-item" data-tab="leaders">
            <div class="nav-icon">🏆</div>
            <div class="nav-label">Лидеры</div>
        </div>
        <div class="nav-item" data-tab="my">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Профиль</div>
        </div>
    </div>
</div>
<script>
    // ------------------- TELEGRAM WEBAPP -------------------
    let tg = null;
    let telegramUser = null;
    let userName = "Игрок";
    
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            telegramUser = tg.initDataUnsafe?.user;
            if (telegramUser) {
                userName = telegramUser.first_name || telegramUser.username || "Игрок";
            }
        }
    } catch(e) { console.log("браузер"); }
    
    // ------------------- ОСНОВНЫЕ ПАРАМЕТРЫ -------------------
    let balance = 90000;
    let currentRound = 1;
    let winStreak = 0;
    let bet = 100;
    let userChoice = "ОРЕЛ";
    const MAX_BET = 100000;
    const MULTIPLIER = 1.95;
    
    let riskActive = false;
    let currentRiskStake = 0;      // текущая сумма в риск-режиме
    let currentRiskStep = 0;        // 0 = первый выигрыш, 1 = второй и т.д.
    
    let multipliersList = [];
    let mult = MULTIPLIER;
    for (let i = 0; i < 12; i++) {
        multipliersList.push(parseFloat(mult.toFixed(2)));
        mult = mult * MULTIPLIER;
    }
    
    // ---------- РЕФЕРАЛЫ ----------
    let referralCount = 0;
    let referralEarnings = 0;
    let myReferralCode = "";
    
    function generateReferralCode() {
        if (telegramUser && telegramUser.id) return "ref_" + telegramUser.id;
        let saved = localStorage.getItem('starsflip_ref_code');
        if (saved) return saved;
        let newCode = "ref_" + Math.random().toString(36).substring(2, 10);
        localStorage.setItem('starsflip_ref_code', newCode);
        return newCode;
    }
    
    function createReferralLink() {
        return `https://t.me/StarsFlipBot?start=${myReferralCode}`;
    }
    
    function copyReferralLink() {
        let link = createReferralLink();
        if (navigator.clipboard) {
            navigator.clipboard.writeText(link);
            showFloatingMessage("Ссылка скопирована!", "#88FF88");
        } else {
            prompt("Скопируйте ссылку:", link);
        }
    }
    
    myReferralCode = generateReferralCode();
    
    // ---------- DOM ЭЛЕМЕНТЫ ----------
    const balanceEl = document.getElementById('balanceValue');
    const roundEl = document.getElementById('roundNum');
    const betInput = document.getElementById('betAmount');
    const historyList = document.getElementById('historyList');
    const playBtn = document.getElementById('playBtn');
    const actionButtons = document.getElementById('actionButtons');
    const takeBtn = document.getElementById('takeBtn');
    const riskBtn = document.getElementById('riskBtn');
    const mainCoinImg = document.getElementById('mainCoinImg');
    const dynamicContent = document.getElementById('dynamicContent');
    const historySection = document.getElementById('historySection');
    const centerStats = document.querySelector('.center-stats');
    const mainCoinDiv = document.querySelector('.main-coin');
    const choiceArea = document.querySelector('.choice-area');
    const betPanel = document.querySelector('.bet-panel');
    const multiplierStrip = document.getElementById('multiplierStrip');
    const kefValue = document.getElementById('kefValue');
    
    // ---------- КРУЖКИ ----------
    function createMultiplierCircles() {
        multiplierStrip.innerHTML = '';
        for (let i = 0; i < multipliersList.length; i++) {
            const circle = document.createElement('div');
            circle.className = 'multiplier-circle';
            circle.innerText = `x${multipliersList[i]}`;
            if (i === 0) circle.classList.add('active');
            multiplierStrip.appendChild(circle);
        }
    }
    createMultiplierCircles();
    const multiplierCircles = document.querySelectorAll('.multiplier-circle');
    
    function updateMultiplierCircles() {
        for (let i = 0; i < multiplierCircles.length; i++) {
            if (i <= currentRiskStep) {
                multiplierCircles[i].classList.add('active');
            } else {
                multiplierCircles[i].classList.remove('active');
            }
        }
        if (kefValue) {
            let displayMult = currentRiskStep === 0 ? MULTIPLIER : multipliersList[currentRiskStep];
            kefValue.innerText = `x${displayMult.toFixed(2)}`;
        }
        // скролл к текущему кружку
        const wrapper = document.querySelector('.multiplier-strip-wrapper');
        const targetCircle = multiplierCircles[currentRiskStep];
        if (targetCircle && wrapper) {
            const scrollLeft = targetCircle.offsetLeft - wrapper.offsetWidth / 2 + targetCircle.offsetWidth / 2;
            wrapper.scrollTo({ left: Math.max(0, scrollLeft), behavior: 'smooth' });
        }
    }
    
    // ---------- ВСПОМОГАТЕЛЬНЫЕ ----------
    let isMessageShowing = false;
    function showFloatingMessage(text, color) {
        if (isMessageShowing) return;
        isMessageShowing = true;
        const msg = document.createElement('div');
        msg.style.position = 'fixed';
        msg.style.top = '100px';
        msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)';
        msg.style.backgroundColor = 'rgba(0,0,0,0.9)';
        msg.style.color = color || '#FFD966';
        msg.style.padding = '10px 20px';
        msg.style.borderRadius = '30px';
        msg.style.fontSize = '0.9rem';
        msg.style.zIndex = '10000';
        msg.style.fontWeight = 'bold';
        msg.innerText = text;
        document.body.appendChild(msg);
        setTimeout(() => { msg.remove(); isMessageShowing = false; }, 1500);
    }
    
    function addHistory(type, amount) {
        const item = document.createElement('div');
        item.className = 'history-item';
        if (type === 'win') {
            item.innerText = `ПОБЕДА +${amount} ⭐`;
            item.classList.add('win');
        } else if (type === 'loss') {
            item.innerText = `ПРОИГРЫШ -${amount} ⭐`;
            item.classList.add('loss');
        } else if (type === 'take') {
            item.innerText = `ЗАБРАНО +${amount} ⭐`;
            item.classList.add('take');
        } else if (type === 'insufficient') {
            item.innerText = 'ПОПОЛНИТЕ БАЛАНС';
            item.classList.add('loss');
            item.style.backgroundColor = '#4A5568';
        }
        historyList.prepend(item);
        while (historyList.children.length > 12) historyList.removeChild(historyList.lastChild);
        saveGame();
    }
    
    function updateBalanceUI() {
        balanceEl.innerText = Math.floor(balance);
    }
    
    function updateBetUI() {
        if (bet < 1) bet = 1;
        if (bet > MAX_BET) bet = MAX_BET;
        if (bet > balance) bet = balance;
        betInput.value = bet;
        saveGame();
    }
    
    function setChoice(choice) {
        userChoice = choice;
        document.querySelectorAll('.coin-choice').forEach(el => {
            if (el.dataset.side === choice) el.classList.add('selected');
            else el.classList.remove('selected');
        });
        saveGame();
    }
    
    function animateCoin(result) {
        return new Promise((resolve) => {
            mainCoinImg.classList.remove('coin-animation');
            void mainCoinImg.offsetHeight;
            mainCoinImg.classList.add('coin-animation');
            mainCoinImg.src = result === 'ОРЕЛ' ? 'IMG_0944-photos.png' : 'IMG_0945-photos.png';
            setTimeout(() => {
                mainCoinImg.classList.remove('coin-animation');
                resolve();
            }, 250);
        });
    }
    
    // ---------- ОСНОВНАЯ ЛОГИКА ----------
    function resetRiskMode() {
        riskActive = false;
        actionButtons.style.display = 'none';
        playBtn.style.display = 'block';
        currentRiskStake = 0;
        currentRiskStep = 0;
        updateMultiplierCircles();
        saveGame();
    }
    
    function takeProfit() {
        if (!riskActive) return;
        balance += currentRiskStake;
        updateBalanceUI();
        addHistory('take', currentRiskStake);
        resetRiskMode();
        currentRound++;
        roundEl.innerText = currentRound;
        winStreak = 0;
        saveGame();
        showFloatingMessage(`✅ Вы забрали ${currentRiskStake} ⭐!`, "#88FF88");
    }
    
    async function riskFlip() {
        if (!riskActive) return;
        const result = Math.random() < 0.5 ? "ОРЕЛ" : "РЕШКА";
        const isWin = result === userChoice;
        await animateCoin(result);
        
        if (isWin) {
            // ВЫИГРЫШ в риск-режиме
            currentRiskStep++;
            currentRiskStake = Math.floor(bet * multipliersList[currentRiskStep]);
            updateMultiplierCircles();
            addHistory('win', currentRiskStake);
            winStreak++;
            updateBalanceUI();
            showFloatingMessage(`🎉 Победа! Теперь x${multipliersList[currentRiskStep].toFixed(2)} — ${currentRiskStake} ⭐`, "#88FF88");
        } else {
            // ПРОИГРЫШ в риск-режиме — СПИСЫВАЕМ ВСЁ
            addHistory('loss', currentRiskStake);
            winStreak = 0;
            resetRiskMode();
            currentRound++;
            roundEl.innerText = currentRound;
            showFloatingMessage(`💔 Проигрыш! Потеряно ${currentRiskStake} ⭐`, "#FF8888");
        }
        saveGame();
    }
    
    async function firstFlip() {
        if (bet > balance) {
            addHistory('insufficient', 0);
            showFloatingMessage("❌ Не хватает Stars!", "#FF8888");
            return;
        }
        
        const result = Math.random() < 0.5 ? "ОРЕЛ" : "РЕШКА";
        const isWin = result === userChoice;
        await animateCoin(result);
        
        if (isWin) {
            // ПЕРВЫЙ ВЫИГРЫШ
            currentRiskStep = 0;
            currentRiskStake = Math.floor(bet * MULTIPLIER);
            riskActive = true;
            actionButtons.style.display = 'flex';
            playBtn.style.display = 'none';
            updateMultiplierCircles();
            addHistory('win', currentRiskStake);
            winStreak++;
            updateBalanceUI();
            showFloatingMessage(`🎉 Победа! +${currentRiskStake} ⭐`, "#88FF88");
        } else {
            // ПРОИГРЫШ — СПИСЫВАЕМ СТАВКУ
            balance -= bet;
            updateBalanceUI();
            addHistory('loss', bet);
            winStreak = 0;
            currentRound++;
            roundEl.innerText = currentRound;
            showFloatingMessage(`💔 Проигрыш! -${bet} ⭐`, "#FF8888");
            if (balance <= 0) {
                addHistory('insufficient', 0);
                showFloatingMessage("💀 Банкрот! Обновите страницу", "#FF8888");
                playBtn.disabled = true;
            }
        }
        updateBetUI();
        saveGame();
    }
    
    function makeBet() {
        if (riskActive) return;
        if (bet < 1 || bet > balance) {
            addHistory('insufficient', 0);
            showFloatingMessage("⚠️ Некорректная ставка", "#FF8888");
            return;
        }
        firstFlip();
    }
    
    // ---------- ПРОФИЛЬ ----------
    function renderProfileTab() {
        centerStats.style.display = 'none';
        mainCoinDiv.style.display = 'none';
        choiceArea.style.display = 'none';
        betPanel.style.display = 'none';
        playBtn.style.display = 'none';
        actionButtons.style.display = 'none';
        historySection.style.display = 'none';
        document.querySelector('.multiplier-strip-wrapper').style.display = 'none';
        
        dynamicContent.style.display = 'flex';
        dynamicContent.style.flexDirection = 'column';
        dynamicContent.style.padding = '16px';
        dynamicContent.style.gap = '16px';
        
        let level = Math.floor(winStreak / 10) + 1;
        
        dynamicContent.innerHTML = `
            <div style="background: linear-gradient(135deg, #1A2438, #0F1626); border-radius: 32px; padding: 24px; text-align: center; border: 1px solid #2A3A50;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #2F9EFF, #4A8BDF); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                    <img src="IMG_0957.png" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                </div>
                <div style="font-size: 1.3rem; font-weight: 700; color: white;">${userName}</div>
                <div style="font-size: 0.7rem; color: #2F9EFF; margin-top: 4px;">⭐ Уровень ${level}</div>
            </div>
            <div style="display: flex; justify-content: space-around; background: #1A2438; border-radius: 28px; padding: 20px 16px;">
                <div><div style="font-size: 1.5rem; font-weight: 700; color: white;">${Math.floor(balance)}</div><div style="font-size: 0.55rem; color: #5A6E8A;">БАЛАНС</div></div>
                <div><div style="font-size: 1.5rem; font-weight: 700; color: white;">${winStreak}</div><div style="font-size: 0.55rem; color: #5A6E8A;">ВИНСТРИК</div></div>
                <div><div style="font-size: 1.5rem; font-weight: 700; color: white;">${currentRound}</div><div style="font-size: 0.55rem; color: #5A6E8A;">РАУНДОВ</div></div>
            </div>
            <div style="background: #1A2438; border-radius: 28px; padding: 20px;">
                <div style="text-align: center; margin-bottom: 20px;"><span style="color: #2F9EFF; font-size: 0.9rem; font-weight: 600;">🤝 РЕФЕРАЛЫ</span></div>
                <div style="display: flex; justify-content: space-around; margin-bottom: 24px;">
                    <div><div style="font-size: 1.3rem; font-weight: 700; color: #FFD966;">${referralCount}</div><div style="font-size: 0.55rem; color: #5A6E8A;">ПРИГЛАШЕНО</div></div>
                    <div><div style="font-size: 1.3rem; font-weight: 700; color: #FFD966;">${referralEarnings}</div><div style="font-size: 0.55rem; color: #5A6E8A;">ЗАРАБОТАНО ⭐</div></div>
                </div>
                <button id="inviteBtn" style="background: #2F9EFF; border: none; border-radius: 60px; padding: 14px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px;">🏆 ПРИГЛАСИТЬ ДРУЗЕЙ</button>
                <button id="copyLinkBtn" style="background: #2A3A50; border: none; border-radius: 60px; padding: 12px; width: 100%; font-weight: bold; cursor: pointer;">📋 КОПИРОВАТЬ ССЫЛКУ</button>
                <div style="font-size: 0.55rem; color: #5A6E8A; text-align: center; margin-top: 14px;">Приглашай друзей и получай 10% от их выигрышей!</div>
            </div>
        `;
        document.getElementById('inviteBtn')?.addEventListener('click', () => copyReferralLink());
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => copyReferralLink());
    }
    
    function renderBonusTab() {
        centerStats.style.display = 'none';
        mainCoinDiv.style.display = 'none';
        choiceArea.style.display = 'none';
        betPanel.style.display = 'none';
        playBtn.style.display = 'none';
        actionButtons.style.display = 'none';
        historySection.style.display = 'none';
        document.querySelector('.multiplier-strip-wrapper').style.display = 'none';
        dynamicContent.style.display = 'flex';
        dynamicContent.style.padding = '16px';
        dynamicContent.innerHTML = `
            <div style="background:#1A2438; border-radius:28px; padding:30px 20px; text-align:center;">
                <div style="font-size:3rem;">🎁</div>
                <div style="font-size:1.2rem; color:white; margin-top:12px;">Ежедневный бонус</div>
                <div style="font-size:0.8rem; color:#5A6E8A; margin-top:8px;">Заходи каждый день и получай бонус!</div>
                <button id="dailyBonusBtn" style="background:#2F9EFF; border:none; border-radius:60px; padding:14px 30px; margin-top:20px; font-weight:bold; cursor:pointer;">ЗАБРАТЬ БОНУС</button>
                <div style="margin-top:20px; font-size:0.7rem; color:#5A6E8A;">Бонус: 1000 ⭐</div>
            </div>
        `;
        document.getElementById('dailyBonusBtn')?.addEventListener('click', () => {
            let lastBonus = localStorage.getItem('lastDailyBonus');
            let today = new Date().toDateString();
            if (lastBonus === today) {
                showFloatingMessage("Бонус уже получен сегодня!", "#FF8888");
            } else {
                balance += 1000;
                updateBalanceUI();
                localStorage.setItem('lastDailyBonus', today);
                showFloatingMessage("Получено 1000 ⭐!", "#88FF88");
                saveGame();
            }
        });
    }
    
    function renderLeadersTab() {
        centerStats.style.display = 'none';
        mainCoinDiv.style.display = 'none';
        choiceArea.style.display = 'none';
        betPanel.style.display = 'none';
        playBtn.style.display = 'none';
        actionButtons.style.display = 'none';
        historySection.style.display = 'none';
        document.querySelector('.multiplier-strip-wrapper').style.display = 'none';
        dynamicContent.style.display = 'flex';
        dynamicContent.style.alignItems = 'center';
        dynamicContent.style.justifyContent = 'center';
        dynamicContent.innerHTML = `
            <div style="text-align:center;">
                <div style="font-size:3rem;">🏆</div>
                <div style="font-size:1.2rem; color:white; margin-top:12px;">Таблица лидеров</div>
                <div style="background:#1A2438; padding:20px; border-radius:30px; margin-top:20px;">
                    <div>1. Игрок_01 — 25000 ⭐</div>
                    <div>2. Игрок_02 — 18000 ⭐</div>
                    <div>3. Игрок_03 — 12000 ⭐</div>
                    <div>4. Игрок_04 — 8900 ⭐</div>
                    <div>5. Игрок_05 — 5400 ⭐</div>
                </div>
            </div>
        `;
    }
    
    function renderCoinTab() {
        dynamicContent.style.display = 'none';
        centerStats.style.display = 'flex';
        mainCoinDiv.style.display = 'block';
        choiceArea.style.display = 'flex';
        betPanel.style.display = 'flex';
        historySection.style.display = 'block';
        document.querySelector('.multiplier-strip-wrapper').style.display = 'block';
        if (riskActive) {
            actionButtons.style.display = 'flex';
            playBtn.style.display = 'none';
        } else {
            actionButtons.style.display = 'none';
            playBtn.style.display = 'block';
        }
    }
    
    // ---------- ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ----------
    const navItems = document.querySelectorAll('.nav-item');
    let currentTab = 'coin';
    
    function switchTab(tab) {
        if (riskActive && tab !== 'coin') {
            showFloatingMessage("Сначала закончи игру!", "#FF8888");
            return;
        }
        currentTab = tab;
        navItems.forEach(item => {
            if (item.dataset.tab === tab) item.classList.add('active');
            else item.classList.remove('active');
        });
        if (tab === 'coin') renderCoinTab();
        else if (tab === 'bonus') renderBonusTab();
        else if (tab === 'leaders') renderLeadersTab();
        else if (tab === 'my') renderProfileTab();
    }
    
    navItems.forEach(item => {
        item.addEventListener('click', () => switchTab(item.dataset.tab));
    });
    
    // ---------- СОХРАНЕНИЕ ----------
    function saveGame() {
        localStorage.setItem('StarsFlipSave', JSON.stringify({
            balance, currentRound, winStreak, bet, userChoice,
            riskActive, currentRiskStake, currentRiskStep,
            referralCount, referralEarnings
        }));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('StarsFlipSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                balance = data.balance ?? 90000;
                currentRound = data.currentRound ?? 1;
                winStreak = data.winStreak ?? 0;
                bet = data.bet ?? 100;
                userChoice = data.userChoice ?? "ОРЕЛ";
                riskActive = data.riskActive ?? false;
                currentRiskStake = data.currentRiskStake ?? 0;
                currentRiskStep = data.currentRiskStep ?? 0;
                referralCount = data.referralCount ?? 0;
                referralEarnings = data.referralEarnings ?? 0;
                updateBalanceUI();
                updateBetUI();
                roundEl.innerText = currentRound;
                setChoice(userChoice);
                if (riskActive) {
                    actionButtons.style.display = 'flex';
                    playBtn.style.display = 'none';
                    updateMultiplierCircles();
                } else {
                    resetRiskMode();
                }
            } catch(e) {}
        }
        setChoice(userChoice);
        mainCoinImg.src = 'IMG_0944-photos.png';
        renderCoinTab();
    }
    
    // ---------- СОБЫТИЯ ----------
    document.getElementById('decBet').addEventListener('click', () => {
        bet = Math.max(1, bet - 10);
        updateBetUI();
    });
    document.getElementById('incBet').addEventListener('click', () => {
        bet = Math.min(MAX_BET, bet + 10);
        if (bet > balance) bet = balance;
        updateBetUI();
    });
    betInput.addEventListener('change', (e) => {
        let v = parseInt(e.target.value);
        if (isNaN(v)) v = 10;
        bet = Math.min(MAX_BET, Math.max(1, v));
        if (bet > balance) bet = balance;
        updateBetUI();
    });
    
    document.querySelectorAll('.coin-choice').forEach(btn => {
        btn.addEventListener('click', () => setChoice(btn.dataset.side));
    });
    
    playBtn.addEventListener('click', makeBet);
    takeBtn.addEventListener('click', takeProfit);
    riskBtn.addEventListener('click', riskFlip);
    
    document.getElementById('howBtn').addEventListener('click', () => {
        alert("StarsFlip\n\n1. Сделай ставку и выбери ОРЁЛ или РЕШКА\n2. Если угадал → можешь ЗАБРАТЬ или КРУТИТЬ ДАЛЬШЕ\n3. Множитель растёт с каждым шагом\n4. При проигрыше теряешь всё\n\nУдачи!");
    });
    
    loadGame();
    if (tg) tg.ready();
</script>
</body>
</html>
